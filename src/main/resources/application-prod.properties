spring.application.name=tournament_aggregator
server.port=8080

# PostgreSQL Configuration (from environment variables)
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/tournament_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration (Production - NO DDL AUTO)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL15Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Redis Configuration (from environment variables)
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.timeout=60000ms
spring.redis.jedis.pool.max-active=16
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=2

# Thymeleaf Configuration (caching enabled for production)
spring.thymeleaf.cache=true
spring.thymeleaf.check-template=true
spring.thymeleaf.prefix=classpath:/templates/

# OpenAPI / Swagger Configuration (disabled in production)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false
springdoc.show-actuator=false

# Logging (minimal logging in production)
logging.level.root=WARN
logging.level.com.example.tournament_aggregator=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Страница не найдена</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body class="app-bg bg-body-tertiary">
<main class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="max-width: 760px; width: 100%;">
        <div class="row g-0">
            <div class="col-lg-5 bg-primary text-white p-4 p-lg-5 d-flex flex-column justify-content-between">
                <div>
                    <span class="badge text-bg-light text-primary rounded-pill mb-3">404</span>
                    <h1 class="display-5 fw-bold mb-3">Страница не найдена</h1>
                    <p class="text-white-50 mb-0">
                        Похоже, ссылка устарела, адрес был введён неверно или страница была удалена.
                    </p>
                </div>
                <div class="mt-4">
                    <a th:href="@{/}" class="btn btn-light w-100">
                        <i class="bi bi-house-door-fill me-2"></i>На главную
                    </a>
                </div>
            </div>
            <div class="col-lg-7 p-4 p-lg-5">
                <h2 class="h4 fw-semibold mb-2">Что можно сделать дальше</h2>
                <p class="text-secondary mb-4">
                    Вернуться на главную, перейти к турнирам или открыть страницу проверки матча.
                </p>

                <div class="d-grid gap-2">
                    <a th:href="@{/tournaments}" class="btn btn-outline-primary btn-lg">Турниры</a>
                    <a th:href="@{/teams}" class="btn btn-outline-secondary btn-lg">Команды</a>
                    <a th:href="@{/match-check}" class="btn btn-primary btn-lg">Проверка матча</a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

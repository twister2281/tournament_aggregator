<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мои подписки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body class="app-bg bg-body-tertiary">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
    <div class="container py-1">
        <a class="navbar-brand fw-semibold" th:href="@{/}"><i class="bi bi-trophy-fill me-2 text-warning"></i>Tournament Aggregator</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Переключить навигацию">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" th:href="@{/tournaments}">Турниры</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/teams}">Команды</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/subscriptions}">Мои подписки</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/match-check}">Проверка матча</a></li>
                <li class="nav-item" th:if="${isAdmin}">
                    <a class="nav-link text-warning fw-semibold" th:href="@{/admin/dashboard}">Админ-панель</a>
                </li>
                <li class="nav-item">
                    <span class="navbar-text me-2 text-white-50">
                        <i class="bi bi-person-circle me-1"></i><span th:text="${currentUsername}">user</span>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-light btn-sm px-3">Выйти</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row align-items-end g-3 mb-4">
        <div class="col-lg-8">
            <span class="badge text-bg-danger rounded-pill mb-3">Подписки</span>
            <h1 class="display-6 fw-bold mb-2">Мои подписки</h1>
            <p class="text-secondary mb-0">Команды, за которыми вы следите.</p>
        </div>
        <div class="col-lg-4 text-lg-end">
            <a th:href="@{/teams}" class="btn btn-outline-primary">
                <i class="bi bi-people me-2"></i>Все команды
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success shadow-sm" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger shadow-sm" th:text="${errorMessage}"></div>

    <div th:if="${#lists.isEmpty(subscriptions)}" class="alert alert-light border shadow-sm">
        <p class="mb-2">У вас пока нет подписок.</p>
        <a th:href="@{/teams}" class="btn btn-primary btn-sm">Перейти к командам</a>
    </div>

    <div class="row g-3" th:unless="${#lists.isEmpty(subscriptions)}">
        <div class="col-12" th:each="item : ${subscriptions}">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 d-flex flex-wrap align-items-center gap-3">
                    <img th:if="${item.logoUrl != null and !item.logoUrl.isBlank()}"
                         th:src="${item.logoUrl}" th:alt="${item.teamName}"
                         class="rounded-3" style="width: 3rem; height: 3rem; object-fit: cover;" />
                    <div th:unless="${item.logoUrl != null and !item.logoUrl.isBlank()}"
                         class="rounded-3 bg-primary-subtle text-primary d-flex align-items-center justify-content-center fw-bold"
                         style="width: 3rem; height: 3rem;" th:text="${item.teamTag}">TAG</div>
                    <div class="flex-grow-1">
                        <div class="fw-semibold fs-5" th:text="${item.teamName}">Team</div>
                        <div class="small text-secondary">
                            <span th:text="${item.teamTag}">TAG</span>
                            <span class="mx-1">•</span>
                            <span>подписка с </span>
                            <span th:text="${item.subscribedAt != null ? #temporals.format(item.subscribedAt, 'dd.MM.yyyy HH:mm') : '—'}">дата</span>
                        </div>
                    </div>
                    <div class="text-end small text-secondary d-none d-md-block">
                        <div>Win rate: <strong th:text="${item.winRate != null ? item.winRate : 0}">0</strong></div>
                        <div>Матчей: <strong th:text="${item.totalMatches != null ? item.totalMatches : 0}">0</strong></div>
                    </div>
                    <form th:action="@{'/subscriptions/' + ${item.subscriptionId} + '/unsubscribe'}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-x-lg me-1"></i>Отписаться
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

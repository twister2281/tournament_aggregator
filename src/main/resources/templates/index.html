<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Aggregator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body class="app-bg bg-body-tertiary">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
    <div class="container py-1">
        <a class="navbar-brand fw-semibold" th:href="@{/}">
            <i class="bi bi-trophy-fill me-2 text-warning"></i>Tournament Aggregator
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Переключить навигацию">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" th:href="@{/tournaments}">Турниры</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/teams}">Команды</a></li>
                <li class="nav-item" th:if="${isAuthenticated}"><a class="nav-link" th:href="@{/subscriptions}">Мои подписки</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/match-check}">Проверка матча</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')" th:if="${isAdmin}">
                    <a class="nav-link text-warning fw-semibold" th:href="@{/admin/dashboard}">Админ-панель</a>
                </li>
                <li class="nav-item" th:if="${!isAuthenticated}"><a class="nav-link" th:href="@{/register}">Регистрация</a></li>
                <li class="nav-item" th:if="${!isAuthenticated}"><a class="nav-link" th:href="@{/login}">Вход</a></li>
                <li class="nav-item" th:if="${!isAuthenticated}">
                    <a class="btn btn-outline-light btn-sm px-3" th:href="@{/auth/steam}">
                        <i class="bi bi-steam me-1"></i>Steam
                    </a>
                </li>
                <li class="nav-item" th:if="${isAuthenticated}">
                    <span class="navbar-text me-2 text-white-50">
                        <i class="bi bi-person-circle me-1"></i>
                        <span th:text="${currentUsername}">user</span>
                    </span>
                </li>
                <li class="nav-item" th:if="${isAuthenticated}">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-light btn-sm px-3">Выйти</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-5">
    <section class="row align-items-center g-4 py-4 py-lg-5">
        <div class="col-lg-7">
            <span class="badge text-bg-primary rounded-pill mb-3">
                 OpenDota • Steam OpenID
            </span>
            <h1 class="display-5 fw-bold mb-3">
                Турнирный агрегатор для команд, матчей и аналитики
            </h1>
            <p class="lead text-secondary mb-4">
            </p>
            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/tournaments}" class="btn btn-outline-secondary btn-lg">
                    <i class="bi bi-grid-3x3-gap me-2"></i>Турниры
                </a>
                <a th:href="@{/match-check}" class="btn btn-primary btn-lg">
                    <i class="bi bi-search me-2"></i>Проверить матч
                </a>
                <a sec:authorize="hasRole('ADMIN')" th:if="${isAdmin}" th:href="@{/admin/dashboard}" class="btn btn-warning btn-lg">
                    <i class="bi bi-gear-fill me-2"></i>Админ-панель
                </a>
                <a th:if="${!isAuthenticated}" th:href="@{/register}" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-person-plus me-2"></i>Регистрация
                </a>
                <form th:if="${isAuthenticated}" th:action="@{/logout}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-outline-secondary btn-lg">Выйти</button>
                </form>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

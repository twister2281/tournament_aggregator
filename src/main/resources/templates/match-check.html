<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Проверка матча OpenDota</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
        }

        .result-card {
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-5px);
        }

        .winner-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">
<div class="container py-4">
    <div class="d-flex justify-content-end mb-3">
        <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-outline-secondary btn-sm">Выйти</button>
        </form>
    </div>
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <!-- Главная карточка -->
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-dark text-white border-0 py-4">
                    <div class="d-flex align-items-center gap-3">
                        <i class="bi bi-shield-check fs-1"></i>
                        <div>
                            <div class="text-uppercase small text-light opacity-75 mb-1">
                                OpenDota API
                            </div>
                            <h1 class="h2 mb-0">Проверка матча по его ID</h1>
                        </div>
                    </div>
                </div>

                <div class="card-body p-4 p-lg-5">
                    <!-- Форма -->
                    <form id="matchForm" autocomplete="off" class="mb-4">
                        <div class="mb-3">
                            <label for="matchId" class="form-label fw-semibold">
                                <i class="bi bi-hash"></i> ID матча
                            </label>
                            <input
                                    id="matchId"
                                    name="matchId"
                                    type="number"
                                    class="form-control form-control-lg"
                                    inputmode="numeric"
                                    min="1"
                                    placeholder="Например: 8825930484"
                                    required
                            />
                            <div class="form-text">
                                <i class="bi bi-info-circle"></i> Поддерживается только числовой ID матча.
                            </div>
                        </div>

                        <button class="btn btn-primary btn-lg w-100" id="submitButton" type="submit">
                            <i class="bi bi-search"></i> Проверить матч
                        </button>
                    </form>

                    <!-- Статус -->
                    <div id="statusBox" class="alert" role="status" aria-live="polite" style="display: none;"></div>

                    <!-- Результаты -->
                    <div id="resultBox" style="display: none;">
                        <hr class="my-4">
                        <h4 class="mb-3">
                            <i class="bi text-warning"></i>
                            Результаты матча
                        </h4>

                        <div class="row g-3">
                            <div class="col-12">
                                <div class="card result-card border-primary bg-light">
                                    <div class="card-body">
                                        <div class="small text-muted text-uppercase fw-semibold mb-1">
                                            <i class="bi bi-hash"></i> Матч
                                        </div>
                                        <div class="fs-5 fw-bold" id="resultMatchId">—</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card result-card h-100 border-success">
                                    <div class="card-body">
                                        <div class="small text-success fw-semibold mb-1">
                                            <i class="bi bi-brightness-alt-high"></i> Radiant
                                        </div>
                                        <div class="fs-4 fw-bold" id="resultRadiant">—</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card result-card h-100 border-danger">
                                    <div class="card-body">
                                        <div class="small text-danger fw-semibold mb-1">
                                            <i class="bi bi-moon-stars"></i> Dire
                                        </div>
                                        <div class="fs-4 fw-bold" id="resultDire">—</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card result-card">
                                    <div class="card-body">
                                        <div class="small text-muted text-uppercase fw-semibold mb-1">
                                            <i class="bi bi-clock"></i> Продолжительность
                                        </div>
                                        <div class="fs-3 fw-bold" id="resultDuration">—</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card result-card winner-badge text-white">
                                    <div class="card-body">
                                        <div class="small text-white-50 text-uppercase fw-semibold mb-1">
                                            <i class="bi bi-trophy"></i> Победитель
                                        </div>
                                        <div class="fs-3 fw-bold" id="resultWinner">—</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Минимальный собственный JS только для логики -->
<script>
    const form = document.getElementById('matchForm');
    const input = document.getElementById('matchId');
    const submitButton = document.getElementById('submitButton');
    const statusBox = document.getElementById('statusBox');
    const resultBox = document.getElementById('resultBox');

    const resultMatchId = document.getElementById('resultMatchId');
    const resultRadiant = document.getElementById('resultRadiant');
    const resultDire = document.getElementById('resultDire');
    const resultDuration = document.getElementById('resultDuration');
    const resultWinner = document.getElementById('resultWinner');

    // Форматирование длительности
    function formatDuration(totalSeconds) {
        const seconds = Number(totalSeconds || 0);
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = seconds % 60;

        if (hours > 0) {
            return `${hours}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        return `${minutes}:${secs.toString().padStart(2, '0')}`;
    }

    // Показ статуса
    function showStatus(message, type) {
        statusBox.textContent = message;
        statusBox.className = `alert alert-${type === 'error' ? 'danger' : 'success'}`;
        statusBox.style.display = 'block';
    }

    function clearStatus() {
        statusBox.style.display = 'none';
        statusBox.className = 'alert';
    }

    // Отображение результатов
    function renderResult(match) {
        resultMatchId.textContent = `#${match.matchId ?? '—'}`;
        resultRadiant.textContent = match.radiantTeamName ?? 'Неизвестно';
        resultDire.textContent = match.direTeamName ?? 'Неизвестно';
        resultDuration.textContent = formatDuration(match.durationSeconds);
        resultWinner.textContent = match.winnerTeamName ?? 'Не определен';
        resultBox.style.display = 'block';

        // Плавная прокрутка к результатам
        setTimeout(() => {
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    function hideResult() {
        resultBox.style.display = 'none';
    }

    // Обработка отправки формы
    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        clearStatus();
        hideResult();

        const matchId = input.value.trim();
        if (!matchId) {
            showStatus('⚠️ Введите ID матча.', 'error');
            input.focus();
            return;
        }

        if (!/^\d+$/.test(matchId)) {
            showStatus('❌ ID матча должен содержать только цифры.', 'error');
            input.focus();
            return;
        }

        // Состояние загрузки
        submitButton.disabled = true;
        const originalButtonHtml = submitButton.innerHTML;
        submitButton.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Ищем матч...';

        try {
            const response = await fetch(`/api/integration/dota/match/${encodeURIComponent(matchId)}`, {
                headers: { 'Accept': 'application/json' }
            });

            const contentType = response.headers.get('content-type') || '';
            const payload = contentType.includes('application/json')
                ? await response.json()
                : { message: await response.text() };

            if (!response.ok) {
                showStatus(payload.message || ' Не удалось получить данные матча.', 'error');
                return;
            }

            if (payload.status && payload.status !== 'success') {
                showStatus(payload.message || ' Матч не найден.', 'error');
                return;
            }

            const match = payload.match ?? payload;
            renderResult(match);
            showStatus('Матч найден', 'success');

        } catch (error) {
            showStatus('❌ Ошибка сети или сервера при запросе к локальному API.', 'error');
            console.error('Error:', error);
        } finally {
            submitButton.disabled = false;
            submitButton.innerHTML = originalButtonHtml;
        }
    });

    // Валидация на лету
    input.addEventListener('input', () => {
        if (input.value && !/^\d+$/.test(input.value)) {
            input.classList.add('is-invalid');
        } else {
            input.classList.remove('is-invalid');
        }
    });
</script>
</body>
</html>

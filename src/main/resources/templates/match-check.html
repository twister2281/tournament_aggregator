<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Проверка матча OpenDota</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
    <link rel="stylesheet" th:href="@{/css/match-check.css}" href="/css/match-check.css">
</head>
<body class="app-bg bg-body-tertiary">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container py-1">
        <a class="navbar-brand fw-semibold" th:href="@{/}"><i class="bi bi-trophy-fill me-2 text-warning"></i>Tournament Aggregator</a>
        <div class="ms-auto d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" th:href="@{/}">Главная</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-xl-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden bg-white">
                <div class="card-header bg-dark text-white p-4">
                    <div class="d-flex align-items-center gap-3">
                        <div class="rounded-circle bg-primary d-inline-flex align-items-center justify-content-center text-white" style="width: 3rem; height: 3rem;">
                            <i class="bi bi-shield-check"></i>
                        </div>
                        <div>
                            <div class="text-uppercase small text-white-50 mb-1">OpenDota API</div>
                            <h1 class="h3 mb-0">Проверка матча по его ID</h1>
                        </div>
                    </div>
                </div>

                <div class="card-body p-4 p-lg-5">
                    <form id="matchForm" autocomplete="off" class="vstack gap-3 mb-4">
                        <div>
                            <label for="matchId" class="form-label fw-semibold">ID матча</label>
                            <input
                                    id="matchId"
                                    name="matchId"
                                    type="number"
                                    class="form-control form-control-lg"
                                    inputmode="numeric"
                                    min="1"
                                    placeholder="Например: 8825930484"
                                    required
                            />
                            <div class="form-text">Поддерживается только числовой ID матча.</div>
                        </div>

                        <button class="btn btn-primary btn-lg w-100" id="submitButton" type="submit">
                            <i class="bi bi-search me-2"></i>Проверить матч
                        </button>
                    </form>

                    <div id="statusBox" class="alert" role="status" aria-live="polite" style="display: none;"></div>

                    <div id="resultBox" style="display: none;">
                        <hr class="my-4">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <h2 class="h4 mb-0"><i class="bi bi-stars text-warning me-2"></i>Результаты матча</h2>
                        </div>

                        <div class="row g-3">
                            <div class="col-12">
                                <div class="card result-card border-0 shadow-sm bg-body-tertiary">
                                    <div class="card-body">
                                        <div class="small text-secondary text-uppercase fw-semibold mb-1">Матч</div>
                                        <div class="fs-5 fw-bold" id="resultMatchId">—</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card result-card border-0 shadow-sm h-100 border-start border-success border-4">
                                    <div class="card-body">
                                        <div class="small text-success fw-semibold mb-1"><i class="bi bi-brightness-alt-high me-1"></i>Radiant</div>
                                        <div class="fs-4 fw-bold" id="resultRadiant">—</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card result-card border-0 shadow-sm h-100 border-start border-danger border-4">
                                    <div class="card-body">
                                        <div class="small text-danger fw-semibold mb-1"><i class="bi bi-moon-stars me-1"></i>Dire</div>
                                        <div class="fs-4 fw-bold" id="resultDire">—</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card result-card border-0 shadow-sm h-100">
                                    <div class="card-body">
                                        <div class="small text-secondary text-uppercase fw-semibold mb-1"><i class="bi bi-clock me-1"></i>Продолжительность</div>
                                        <div class="fs-4 fw-bold" id="resultDuration">—</div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="card result-card border-0 shadow-sm h-100 text-bg-danger">
                                    <div class="card-body">
                                        <div class="small text-white-50 text-uppercase fw-semibold mb-1"><i class="bi bi-trophy me-1"></i>Победитель</div>
                                        <div class="fs-4 fw-bold" id="resultWinner">—</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/match-check.js}" src="/js/match-check.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3">Создать аккаунт</h1>

                    <div th:if="${formError}" class="alert alert-danger" th:text="${formError}"></div>

                    <form th:action="@{/register}" th:object="${registrationRequest}" method="post" autocomplete="off">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label for="username" class="form-label">Логин</label>
                            <input type="text" id="username" th:field="*{username}" class="form-control" />
                            <div class="text-danger small" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control" />
                            <div class="text-danger small" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control" />
                            <div class="text-danger small" th:errors="*{password}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Повторите пароль</label>
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" />
                            <div class="text-danger small" th:errors="*{confirmPassword}"></div>
                            <div class="text-danger small" th:errors="*{passwordsMatch}"></div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="firstName" class="form-label">Имя</label>
                                <input type="text" id="firstName" th:field="*{firstName}" class="form-control" />
                                <div class="text-danger small" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="lastName" class="form-label">Фамилия</label>
                                <input type="text" id="lastName" th:field="*{lastName}" class="form-control" />
                                <div class="text-danger small" th:errors="*{lastName}"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a th:href="@{/login}">Уже есть аккаунт? Войти</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
</head>
<body class="app-bg bg-body-tertiary">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container py-1">
        <a class="navbar-brand fw-semibold" th:href="@{/}"><i class="bi bi-trophy-fill me-2 text-warning"></i>Tournament Aggregator</a>
        <div class="ms-auto d-flex flex-wrap gap-2 align-items-center">
            <a class="btn btn-outline-light btn-sm" th:href="@{/}">Главная</a>
            <a sec:authorize="hasRole('ADMIN')" th:if="${isAdmin}" class="btn btn-warning btn-sm fw-semibold" th:href="@{/admin/dashboard}">
                <i class="bi bi-gear-fill me-1"></i>Админ-панель
            </a>
            <a class="btn btn-outline-light btn-sm" th:href="@{/register}">Регистрация</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <div class="row align-items-center g-4 min-vh-100 py-4">
        <div class="col-lg-5 offset-lg-1">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <h2 class="h3 fw-semibold mb-4">Вход в аккаунт</h2>

                    <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль.</div>
                    <div th:if="${param.steamError}" class="alert alert-danger">Не удалось выполнить вход через Steam.</div>
                    <div th:if="${param.registered}" class="alert alert-success">Регистрация успешна. Войдите в аккаунт.</div>
                    <div th:if="${param.logout}" class="alert alert-info">Вы вышли из системы.</div>
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                    <form th:action="@{/login}" method="post" autocomplete="off" class="vstack gap-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div>
                            <label for="username" class="form-label">Логин</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Введите логин" required>
                        </div>

                        <div>
                            <label for="password" class="form-label">Пароль</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Введите пароль" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">Войти</button>
                    </form>

                    <div class="d-flex align-items-center gap-3 my-4">
                        <hr class="flex-grow-1">
                        <span class="text-secondary small">или</span>
                        <hr class="flex-grow-1">
                    </div>

                    <a th:href="@{/auth/steam}" class="btn btn-dark btn-lg w-100">
                        <i class="bi bi-steam me-2"></i>Войти через Steam
                    </a>

                    <p class="text-center mt-4 mb-0 text-secondary">
                        Нет аккаунта? <a th:href="@{/register}" class="link-primary">Зарегистрироваться</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
